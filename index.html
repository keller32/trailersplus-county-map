<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrailersPlus - County Coverage Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    background: #1a1d27;
    border-bottom: 2px solid #2a7fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  h1 { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .subtitle { font-size: 12px; color: #888; margin-top: 2px; }
  .stats { display: flex; gap: 20px; font-size: 12px; color: #aaa; }
  .stat-item span { color: #4af; font-weight: 600; font-size: 14px; }
  .main { display: flex; flex: 1; overflow: hidden; }
  #map-container { flex: 1; position: relative; overflow: hidden; background: #0f1117; }
  svg { width: 100%; height: 100%; display: block; }
  .county { stroke: #1a1d27; stroke-width: 0.3px; cursor: pointer; transition: opacity 0.1s; }
  .county:hover { opacity: 0.75; stroke-width: 1.2px; stroke: #fff; }
  .county.unassigned { fill: #2a2d3a; }
  .state-border { fill: none; stroke: #555; stroke-width: 0.8px; pointer-events: none; }
  #sidebar {
    width: 260px; background: #1a1d27;
    border-left: 1px solid #2a2e40;
    display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
  }
  #sidebar-header {
    padding: 12px 14px; border-bottom: 1px solid #2a2e40;
    font-size: 12px; font-weight: 600; color: #aaa;
    text-transform: uppercase; letter-spacing: 1px;
  }
  #search-box {
    margin: 10px 12px; padding: 7px 10px;
    background: #0f1117; border: 1px solid #2a2e40;
    border-radius: 4px; color: #e0e0e0; font-size: 12px;
    width: calc(100% - 24px);
  }
  #search-box:focus { outline: none; border-color: #2a7fff; }
  #store-list { flex: 1; overflow-y: auto; padding: 4px 0; }
  #store-list::-webkit-scrollbar { width: 5px; }
  #store-list::-webkit-scrollbar-track { background: #0f1117; }
  #store-list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .store-item {
    display: flex; align-items: center; padding: 6px 14px;
    cursor: pointer; border-radius: 3px; margin: 1px 6px; transition: background 0.15s;
  }
  .store-item:hover { background: #252838; }
  .store-item.active { background: #1e2b4a; }
  .store-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
  .store-info { flex: 1; min-width: 0; }
  .store-name { font-size: 11.5px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .store-id { font-size: 10px; color: #666; }
  .store-count { font-size: 10px; color: #888; margin-left: 4px; flex-shrink: 0; }
  #tooltip {
    position: absolute; background: rgba(15,17,23,0.95);
    border: 1px solid #2a7fff; border-radius: 5px; padding: 8px 12px;
    font-size: 12px; pointer-events: none; opacity: 0;
    transition: opacity 0.1s; z-index: 100; max-width: 220px;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tip-county { font-weight: 700; color: #fff; font-size: 13px; }
  #tooltip .tip-state { color: #888; font-size: 11px; }
  #tooltip .tip-store { color: #4af; margin-top: 4px; font-size: 11.5px; }
  #tooltip .tip-unassigned { color: #888; margin-top: 4px; font-style: italic; }
  .controls { position: absolute; top: 12px; left: 12px; display: flex; gap: 6px; z-index: 10; }
  .ctrl-btn {
    background: rgba(26,29,39,0.92); border: 1px solid #2a2e40;
    color: #aaa; padding: 6px 10px; border-radius: 4px;
    cursor: pointer; font-size: 14px; transition: all 0.15s;
  }
  .ctrl-btn:hover { background: #252838; color: #fff; border-color: #2a7fff; }
  .legend-pill {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(26,29,39,0.92); border: 1px solid #2a2e40;
    border-radius: 5px; padding: 8px 12px; font-size: 11px;
    display: flex; gap: 14px;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; color: #aaa; }
  .leg-swatch { width: 12px; height: 12px; border-radius: 2px; }
  #gaps-toggle {
    position: absolute; top: 12px; right: 12px;
    background: rgba(26,29,39,0.92); border: 1px solid #2a2e40;
    border-radius: 4px; padding: 6px 12px; font-size: 11px;
    color: #aaa; cursor: pointer; z-index: 10; user-select: none; transition: all 0.15s;
  }
  #gaps-toggle:hover { border-color: #2a7fff; color: #fff; }
  #gaps-toggle.active { border-color: #f90; color: #f90; background: rgba(255,153,0,0.08); }
  #loading {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center; color: #888; font-size: 14px;
  }
  #loading .spinner {
    width: 32px; height: 32px; border: 3px solid #2a2e40;
    border-top-color: #2a7fff; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #last-updated { position: absolute; bottom: 12px; right: 12px; font-size: 10px; color: #555; }
  .highlighted .county.assigned:not(.highlighted-county) { opacity: 0.1; }
  .gaps-mode .county.assigned { opacity: 0.08; }
</style>
</head>
<body>

<header>
  <div>
    <h1>TrailersPlus - County Coverage Map</h1>
    <div class="subtitle">Live from Google Sheets - hover counties for details, click to highlight a store territory</div>
  </div>
  <div class="stats">
    <div class="stat-item">Assigned Counties<br><span id="stat-assigned">-</span></div>
    <div class="stat-item">Active Stores<br><span id="stat-stores">-</span></div>
    <div class="stat-item">Unassigned Counties<br><span id="stat-unassigned">-</span></div>
  </div>
</header>

<div class="main">
  <div id="map-container">
    <div class="controls">
      <button class="ctrl-btn" id="zoom-in">+</button>
      <button class="ctrl-btn" id="zoom-out">-</button>
      <button class="ctrl-btn" id="zoom-reset" title="Reset view">&#8962;</button>
    </div>
    <div id="gaps-toggle">&#9650; Show Gaps Only</div>
    <svg id="map"></svg>
    <div id="tooltip"></div>
    <div class="legend-pill">
      <div class="leg-item">
        <div class="leg-swatch" style="background:#2a2d3a;border:1px solid #444"></div>
        Unassigned
      </div>
      <div class="leg-item">
        <div class="leg-swatch" style="background:linear-gradient(90deg,hsl(140,70%,45%),hsl(220,70%,55%),hsl(320,70%,50%))"></div>
        Assigned (color = store)
      </div>
    </div>
    <div id="last-updated"></div>
    <div id="loading"><div class="spinner"></div><div id="loading-msg">Loading map data...</div></div>
  </div>
  <div id="sidebar">
    <div id="sidebar-header">Store Territories</div>
    <input type="text" id="search-box" placeholder="Search by store name or ID..." />
    <div id="store-list"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTKJZfAByomCTw6SBAAtrZvEOGQCeOpB17GDQU7j967dqe0KySdgude-SrF4iZa1RCbEDfntIx4TE7A/pub?gid=0&single=true&output=csv';
const TOPO_URL      = 'https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json';
// allorigins proxies the request server-side, bypassing any browser CORS issue
const PROXY_URL     = 'https://api.allorigins.win/raw?url=';
// ─────────────────────────────────────────────────────────────────────────────

const STATE_FIPS = {
  'AL':'01','AK':'02','AZ':'04','AR':'05','CA':'06','CO':'08','CT':'09','DE':'10',
  'DC':'11','FL':'12','GA':'13','HI':'15','ID':'16','IL':'17','IN':'18','IA':'19',
  'KS':'20','KY':'21','LA':'22','ME':'23','MD':'24','MA':'25','MI':'26','MN':'27',
  'MS':'28','MO':'29','MT':'30','NE':'31','NV':'32','NH':'33','NJ':'34','NM':'35',
  'NY':'36','NC':'37','ND':'38','OH':'39','OK':'40','OR':'41','PA':'42','RI':'44',
  'SC':'45','SD':'46','TN':'47','TX':'48','UT':'49','VT':'50','VA':'51','WA':'53',
  'WV':'54','WI':'55','WY':'56'
};
const FIPS_STATE = Object.fromEntries(Object.entries(STATE_FIPS).map(([k,v]) => [v,k]));

// ── FETCH WITH FALLBACK ───────────────────────────────────────────────────────
// Try direct fetch first. If it fails (CORS, redirect issue), retry via proxy.
async function fetchCSV(url) {
  setLoadingMsg('Fetching sheet data...');
  try {
    const r = await fetch(url, { redirect: 'follow' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    // Sanity check - should start with a header row, not HTML
    if (text.trim().startsWith('<')) throw new Error('Got HTML instead of CSV');
    console.log('CSV loaded directly');
    return text;
  } catch (e) {
    console.warn('Direct fetch failed (' + e.message + '), trying proxy...');
    setLoadingMsg('Retrying via proxy...');
    const r2 = await fetch(PROXY_URL + encodeURIComponent(url));
    if (!r2.ok) throw new Error('Proxy fetch failed: HTTP ' + r2.status);
    const text = await r2.text();
    if (text.trim().startsWith('<')) throw new Error('Proxy returned HTML - check sheet is published');
    console.log('CSV loaded via proxy');
    return text;
  }
}

function setLoadingMsg(msg) {
  const el = document.getElementById('loading-msg');
  if (el) el.textContent = msg;
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    const row = {};
    headers.forEach((h, i) => row[h] = (cols[i] || '').replace(/^"|"$/g, '').trim());
    return row;
  }).filter(r => r.County && r.State);
}

// ── COLOR ─────────────────────────────────────────────────────────────────────
function storeColor(storeId) {
  let hash = 0;
  for (let i = 0; i < storeId.length; i++) {
    hash = ((hash << 5) - hash) + storeId.charCodeAt(i);
    hash |= 0;
  }
  const hue   = Math.abs(hash) % 360;
  const sat   = 55 + (Math.abs(hash >> 8)  % 25);
  const light = 42 + (Math.abs(hash >> 16) % 20);
  return `hsl(${hue},${sat}%,${light}%)`;
}

// ── NORMALIZE ─────────────────────────────────────────────────────────────────
function normalize(str) {
  return (str || '').toUpperCase()
    .replace(/ COUNTY$/, '').replace(/ PARISH$/, '').replace(/ BOROUGH$/, '')
    .replace(/ CENSUS AREA$/, '').replace(/ MUNICIPALITY$/, '')
    .replace(/ CITY AND BOROUGH$/, '').replace(/ CITY$/, '')
    .trim();
}

// ── APP STATE ─────────────────────────────────────────────────────────────────
let selectedStore = null;
let showGapsOnly  = false;
let storeData     = {};
let nameLookup    = {};
let storeList     = [];

function buildLookup(rows) {
  nameLookup = {}; storeData = {}; storeList = [];
  const seen = new Set();
  rows.forEach(row => {
    const county    = (row.County            || '').toUpperCase().trim();
    const state     = (row.State             || '').toUpperCase().trim();
    const storeId   = (row.Assigned_StoreID  || '').trim();
    const storeName = (row.StoreName         || '').trim();
    if (!county || !state || !storeId) return;
    if (!seen.has(storeId)) {
      seen.add(storeId);
      storeList.push(storeId);
      storeData[storeId] = { name: storeName || storeId, color: storeColor(storeId), count: 0 };
    }
    storeData[storeId].count++;
    nameLookup[normalize(county) + '_' + state] = storeId;
    nameLookup[county + '_' + state]             = storeId;
  });
  storeList.sort((a, b) => storeData[a].name.localeCompare(storeData[b].name));
}

function getStoreForCounty(d) {
  if (!d || !d.properties) return null;
  const name  = d.properties.name || '';
  const fips2 = String(d.id || '').substring(0, 2).padStart(2, '0');
  const state = FIPS_STATE[fips2];
  if (!state) return null;
  return nameLookup[normalize(name) + '_' + state]
      || nameLookup[name.toUpperCase() + '_' + state]
      || null;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function renderSidebar(filter) {
  filter = (filter || '').toLowerCase();
  const container = document.getElementById('store-list');
  const visible = storeList.filter(sid => {
    const d = storeData[sid];
    return !filter || d.name.toLowerCase().includes(filter) || sid.toLowerCase().includes(filter);
  });
  container.innerHTML = visible.map(sid => {
    const d = storeData[sid];
    return `<div class="store-item${selectedStore === sid ? ' active' : ''}" data-store="${sid}" onclick="selectStore('${sid}')">
      <div class="store-dot" style="background:${d.color}"></div>
      <div class="store-info">
        <div class="store-name">${d.name}</div>
        <div class="store-id">${sid}</div>
      </div>
      <div class="store-count">${d.count}c</div>
    </div>`;
  }).join('');
}

function selectStore(sid) {
  selectedStore = (selectedStore === sid) ? null : sid;
  renderSidebar(document.getElementById('search-box').value);
  applyHighlight();
}

function applyHighlight() {
  const svg = d3.select('#map');
  svg.classed('highlighted', !!selectedStore && !showGapsOnly);
  svg.classed('gaps-mode', showGapsOnly);
  d3.selectAll('.county').classed('highlighted-county', d =>
    !!selectedStore && getStoreForCounty(d) === selectedStore
  );
}

document.getElementById('search-box').addEventListener('input', e => renderSidebar(e.target.value));

document.getElementById('gaps-toggle').addEventListener('click', function() {
  showGapsOnly = !showGapsOnly;
  selectedStore = null;
  this.classList.toggle('active', showGapsOnly);
  this.textContent = showGapsOnly ? '✕ Back to Full Map' : '▲ Show Gaps Only';
  renderSidebar(document.getElementById('search-box').value);
  applyHighlight();
});

// ── MAP ───────────────────────────────────────────────────────────────────────
const svg    = d3.select('#map');
const mapEl  = document.getElementById('map-container');
const tooltip = document.getElementById('tooltip');

const projection = d3.geoAlbersUsa().scale(1200).translate([800, 450]);
const path = d3.geoPath().projection(projection);

const zoom = d3.zoom()
  .scaleExtent([0.5, 14])
  .on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);
const g = svg.append('g');

document.getElementById('zoom-in').addEventListener('click',    () => svg.transition().duration(280).call(zoom.scaleBy, 1.5));
document.getElementById('zoom-out').addEventListener('click',   () => svg.transition().duration(280).call(zoom.scaleBy, 0.67));
document.getElementById('zoom-reset').addEventListener('click', () => svg.transition().duration(380).call(zoom.transform, d3.zoomIdentity));

function renderMap(us) {
  const counties = topojson.feature(us, us.objects.counties);
  const states   = topojson.mesh(us, us.objects.states, (a, b) => a !== b);

  let assigned = 0, unassigned = 0;

  g.selectAll('.county').remove();
  g.selectAll('.state-border').remove();

  g.selectAll('.county')
    .data(counties.features)
    .enter()
    .append('path')
    .attr('class', d => {
      const store = getStoreForCounty(d);
      if (store) { assigned++; return 'county assigned'; }
      unassigned++;
      return 'county unassigned';
    })
    .attr('d', path)
    .attr('fill', d => {
      const store = getStoreForCounty(d);
      return store ? storeData[store].color : '#2a2d3a';
    })
    .on('mousemove', function(event, d) {
      const store = getStoreForCounty(d);
      const name  = d.properties.name || 'Unknown';
      const fips2 = String(d.id || '').substring(0, 2).padStart(2, '0');
      const state = FIPS_STATE[fips2] || fips2;
      let html = `<div class="tip-county">${name}</div><div class="tip-state">${state}</div>`;
      if (store) {
        html += `<div class="tip-store">&#9679; ${store}<br>${storeData[store]?.name || ''}</div>`;
      } else {
        html += `<div class="tip-unassigned">Not assigned to any store</div>`;
      }
      tooltip.innerHTML = html;
      tooltip.classList.add('visible');
      const rect = mapEl.getBoundingClientRect();
      let x = event.clientX - rect.left + 14;
      let y = event.clientY - rect.top  + 14;
      if (x + 230 > rect.width)  x = event.clientX - rect.left - 234;
      if (y + 90  > rect.height) y = event.clientY - rect.top  - 90;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    })
    .on('mouseleave', () => tooltip.classList.remove('visible'))
    .on('click', function(event, d) {
      const store = getStoreForCounty(d);
      if (!store) return;
      showGapsOnly = false;
      document.getElementById('gaps-toggle').classList.remove('active');
      document.getElementById('gaps-toggle').textContent = '▲ Show Gaps Only';
      selectStore(store);
      setTimeout(() => {
        const el = document.querySelector(`.store-item[data-store="${store}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    });

  g.append('path')
    .datum(states)
    .attr('class', 'state-border')
    .attr('d', path);

  document.getElementById('stat-assigned').textContent   = assigned.toLocaleString();
  document.getElementById('stat-unassigned').textContent = unassigned.toLocaleString();
  document.getElementById('stat-stores').textContent     = storeList.length.toLocaleString();
  document.getElementById('last-updated').textContent    = 'Data loaded: ' + new Date().toLocaleString();
  document.getElementById('loading').style.display       = 'none';

  renderSidebar();
  applyHighlight();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
setLoadingMsg('Loading map boundaries...');
Promise.all([
  fetchCSV(SHEET_CSV_URL),
  fetch(TOPO_URL).then(r => { if (!r.ok) throw new Error('TopoJSON fetch failed'); return r.json(); })
])
.then(([csvText, us]) => {
  const rows = parseCSV(csvText);
  if (!rows.length) throw new Error('CSV parsed 0 rows - check sheet is published as CSV');
  buildLookup(rows);
  renderMap(us);
})
.catch(err => {
  document.getElementById('loading').innerHTML =
    `<div style="color:#f66;font-size:13px;line-height:1.6">
      Failed to load data.<br>
      <small style="color:#aaa">${err.message}</small><br><br>
      <small style="color:#666">
        1. Open your Google Sheet<br>
        2. File > Share > Publish to web<br>
        3. Confirm Sheet1 / CSV is selected<br>
        4. Click Publish
      </small>
    </div>`;
  console.error('Map load error:', err);
});
</script>
</body>
</html>
